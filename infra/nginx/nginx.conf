# Click Me — nginx (backend 앞단). FE는 Vercel/next dev가 담당 → nginx는 /api만 프록시.
upstream backend {
    server backend:8000;        # 베이스라인 1대. 확장 시 server 추가 + 이벤트버스 공유 선행
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;   # 광고 이미지 업로드 한도

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;   # → audit IP
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: 버퍼링 off + 긴 타임아웃
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        return 200 "Click Me API edge. Frontend = Vercel / next dev.\n";
        add_header Content-Type text/plain;
    }
}
